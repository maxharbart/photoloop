version: "3.9"

services:

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-photos}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?required}
      POSTGRES_DB: ${POSTGRES_DB:-photos}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-photos}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-photos}:${POSTGRES_PASSWORD}@postgres/${POSTGRES_DB:-photos}
      REDIS_URL: redis://redis:6379/0
      MEDIA_ROOT: /media
      THUMBS_ROOT: /thumbs
      SECRET_KEY: ${SECRET_KEY:?required}
    volumes:
      - ${SAMBA_MOUNT_PATH:?required}:/media:ro
      - thumbs_data:/thumbs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000"

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-photos}:${POSTGRES_PASSWORD}@postgres/${POSTGRES_DB:-photos}
      REDIS_URL: redis://redis:6379/0
      MEDIA_ROOT: /media
      THUMBS_ROOT: /thumbs
      SECRET_KEY: ${SECRET_KEY:?required}
    volumes:
      - ${SAMBA_MOUNT_PATH:?required}:/media:ro
      - thumbs_data:/thumbs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A app.tasks.celery_app worker --loglevel=info --concurrency=2

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: /api

  nginx:
    image: nginx:1.25-alpine
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - thumbs_data:/thumbs:ro
    depends_on:
      - backend
      - frontend

volumes:
  postgres_data:
  redis_data:
  thumbs_data:

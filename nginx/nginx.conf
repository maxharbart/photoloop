events {}

http {
  # Use Docker's internal DNS resolver so hostnames are re-resolved after restarts
  resolver 127.0.0.11 valid=10s ipv6=off;

  server {
    listen 80;
    client_max_body_size 50m;

    # Thumbnails served directly — bypasses backend entirely
    location /thumbs/ {
      alias /thumbs/;
      expires 30d;
      add_header Cache-Control "public, immutable";
    }

    # Internal location for X-Accel-Redirect (video streaming)
    location /internal-media/ {
      internal;
      alias /media/;
    }

    # API
    location /api/ {
      set $backend http://backend:8000;
      proxy_pass $backend;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_read_timeout 120s;
    }

    # Frontend (catch-all)
    location / {
      set $frontend http://frontend:3000;
      proxy_pass $frontend;
      proxy_set_header Host $host;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
    }
  }
}
